name: 'Build Kyria'
on: workflow_dispatch
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano_v2"]'
      shield: '["kyria_left","kyria_right"]'
      kconfig: '["CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=16/nCONFIG_ZMK_DISPLAY=y/nCONFIG_ZMK_USB=y"]'
